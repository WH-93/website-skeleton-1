<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone icon comparison v2</title>
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #F5F0EB;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0; gap: 48px; flex-wrap: wrap; padding: 40px;
  }
  .card {
    background: white; border-radius: 16px; padding: 36px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08); text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #B08D57; font-weight: 700; }
  .icons { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .icon-wrap { 
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(176,141,87,0.35);
    display: flex; align-items: center; justify-content: center; background: white;
  }
  .icon-wrap-lg { width: 60px; height: 60px; }
  svg { stroke: #B08D57; }
  .verdict { font-size: 11px; margin-top: 4px; padding: 5px 12px; border-radius: 20px; font-weight: 600; }
  .pass { background: #e6f4ea; color: #1e7e34; }
  .fail { background: #fce8e6; color: #c5221f; }
  .note { font-size: 11px; color: rgba(11,17,32,0.5); max-width: 220px; line-height: 1.5; }
</style>
</head>
<body>

<div class="card">
  <span class="label fail">CURRENT (handset + waves)</span>
  <div class="icons">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <path d="M15.05 5A5 5 0 0 1 19 8.95M15.05 1A9 9 0 0 1 23 8.94M17 16.5l-3.7 3.7c-1.5.5-3.1.8-4.8.8A12 12 0 0 1 3 15c-2-4 0-9 5-12l3.7 3.7c-.2 1.5.4 3 1.3 4.1a6 6 0 0 0 4 2z"/>
      </svg>
    </div>
  </div>
  <span class="verdict fail">Reads as head profile + speech</span>
</div>

<div class="card">
  <span class="label pass" style="color:#B08D57">PROPOSED — tall smartphone</span>
  <div class="icons">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <rect x="6" y="1" width="12" height="22" rx="2"/>
        <line x1="10" y1="4" x2="14" y2="4"/>
        <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <div class="icon-wrap icon-wrap-lg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="28" height="28">
        <rect x="6" y="1" width="12" height="22" rx="2"/>
        <line x1="10" y1="4" x2="14" y2="4"/>
        <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>
  </div>
  <span class="verdict pass">Unmistakably a phone</span>
  <p class="note">Taller aspect ratio + speaker line at top = reads as phone, not generic rectangle</p>
</div>

<div class="card">
  <span class="label" style="color:#888">REFERENCE — Lucide phone</span>
  <div class="icons">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </div>
  </div>
  <span class="verdict" style="background:#fff3e0;color:#e65100">Classic handset — clean but old-school</span>
</div>

</body>
</html>
